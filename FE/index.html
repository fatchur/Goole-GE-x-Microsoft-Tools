<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CNGPT — Demo SSO (BFF)</title>

<!-- Vue 3 lewat CDN, tanpa build tool, sengaja dibuat sesederhana mungkin -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>

<style>
  :root {
    --navy: #1a237e;
    --navy-dark: #10164f;
    --bg: #f5f6fa;
    --border: #dfe3ee;
    --text: #212121;
    --muted: #6b7280;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
  }

  /* ---------- Layout umum ---------- */
  .page {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  header {
    background: var(--navy);
    color: white;
    padding: 14px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  header .brand {
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 0.3px;
  }
  header .user-box {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 14px;
  }
  header .avatar {
    width: 30px;
    height: 30px;
    border-radius: 50%;
    background: #3949ab;
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 13px;
  }
  header button {
    background: transparent;
    border: 1px solid rgba(255,255,255,0.4);
    color: white;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
  }
  header button:hover { background: rgba(255,255,255,0.12); }

  /* ---------- Halaman belum login ---------- */
  .center-screen {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }
  .login-card {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 40px 36px;
    max-width: 380px;
    width: 100%;
    text-align: center;
    box-shadow: 0 2px 10px rgba(16, 22, 79, 0.06);
  }
  .login-card h1 {
    font-size: 20px;
    margin: 4px 0 6px;
  }
  .login-card p {
    color: var(--muted);
    font-size: 13.5px;
    line-height: 1.5;
    margin-bottom: 26px;
  }
  .ms-login-btn {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: var(--navy);
    color: white;
    border: none;
    padding: 11px 20px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    width: 100%;
    justify-content: center;
  }
  .ms-login-btn:hover { background: var(--navy-dark); }
  .ms-icon {
    width: 16px;
    height: 16px;
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 2px;
  }
  .ms-icon span { display: block; }
  .ms-icon span:nth-child(1) { background: #f25022; }
  .ms-icon span:nth-child(2) { background: #7fba00; }
  .ms-icon span:nth-child(3) { background: #00a4ef; }
  .ms-icon span:nth-child(4) { background: #ffb900; }

  .error-box {
    margin-top: 16px;
    background: #fdecea;
    color: #b3261e;
    border: 1px solid #f6c6c2;
    border-radius: 8px;
    padding: 10px 12px;
    font-size: 12.5px;
    text-align: left;
  }

  /* ---------- Halaman chat (sudah login) ---------- */
  .chat-wrap {
    flex: 1;
    display: flex;
    flex-direction: column;
    max-width: 720px;
    width: 100%;
    margin: 0 auto;
    padding: 20px 16px;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 14px;
    padding-bottom: 12px;
  }
  .empty-state {
    margin: auto;
    text-align: center;
    color: var(--muted);
    font-size: 13.5px;
    max-width: 320px;
  }
  .bubble {
    max-width: 78%;
    padding: 10px 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    white-space: pre-wrap;
  }
  .bubble.user {
    align-self: flex-end;
    background: var(--navy);
    color: white;
    border-bottom-right-radius: 3px;
  }
  .bubble.assistant {
    align-self: flex-start;
    background: white;
    border: 1px solid var(--border);
    border-bottom-left-radius: 3px;
  }
  .bubble.error {
    align-self: flex-start;
    background: #fdecea;
    border: 1px solid #f6c6c2;
    color: #b3261e;
  }
  .bubble.pending {
    align-self: flex-start;
    background: white;
    border: 1px solid var(--border);
    color: var(--muted);
    font-style: italic;
  }

  /* ---------- File attachment styles ---------- */
  .file-preview {
    background: #f8f9fa;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }
  .file-preview-icon {
    font-size: 24px;
    flex-shrink: 0;
  }
  .file-preview-info {
    flex: 1;
    min-width: 0;
  }
  .file-preview-name {
    font-weight: 600;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .file-preview-size {
    color: var(--muted);
    font-size: 11px;
  }
  .file-preview-remove {
    background: #dc3545;
    color: white;
    border: none;
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    flex-shrink: 0;
  }
  .file-preview-remove:hover {
    background: #c82333;
  }
  .file-preview-image {
    max-width: 200px;
    max-height: 150px;
    border-radius: 6px;
    margin-top: 8px;
    object-fit: contain;
  }

  .composer {
    display: flex;
    flex-direction: column;
    gap: 8px;
    border: 1px solid var(--border);
    background: white;
    border-radius: 10px;
    padding: 8px;
  }
  .composer-input-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .composer input[type="text"] {
    flex: 1;
    border: none;
    outline: none;
    font-size: 14px;
    padding: 8px 6px;
  }
  .composer input[type="file"] {
    display: none;
  }
  .composer .attach-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--navy);
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 18px;
    line-height: 1;
    transition: all 0.2s;
  }
  .composer .attach-btn:hover {
    background: #f0f1f5;
    border-color: var(--navy);
  }
  .composer button.send-btn {
    background: var(--navy);
    color: white;
    border: none;
    padding: 0 18px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 14px;
    font-weight: 600;
  }
  .composer button:disabled {
    background: #b7bce0;
    cursor: not-allowed;
  }

  /* Bubble with attachment */
  .bubble-attachment {
    margin-top: 8px;
    padding: 8px;
    background: rgba(0,0,0,0.05);
    border-radius: 6px;
  }
  .bubble-attachment-image {
    max-width: 100%;
    max-height: 300px;
    border-radius: 4px;
    display: block;
  }
  .bubble-attachment-file {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 12px;
  }
  .bubble-attachment-icon {
    font-size: 20px;
  }

  .checking {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 100vh;
    color: var(--muted);
    font-size: 14px;
  }

  /* ---------- Connector panel ---------- */
  .connector-panel {
    background: white;
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .connector-panel h3 {
    margin: 0 0 12px;
    font-size: 15px;
    font-weight: 600;
  }
  .connector-actions {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  .connector-actions button {
    background: var(--navy);
    color: white;
    border: none;
    padding: 8px 16px;
    border-radius: 8px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .connector-actions button:hover {
    background: var(--navy-dark);
  }
  .connector-actions button:disabled {
    background: #b7bce0;
    cursor: not-allowed;
  }
  .connector-list {
    background: #f9fafb;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    max-height: 300px;
    overflow-y: auto;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    white-space: pre-wrap;
    word-break: break-all;
  }
  .connector-list.empty {
    color: var(--muted);
    font-family: -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    font-style: italic;
    text-align: center;
  }
  .connector-item {
    background: white;
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
  }
  .connector-item:last-child {
    margin-bottom: 0;
  }
  .connector-item-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
  }
  .connector-item-name {
    font-weight: 600;
    font-size: 14px;
  }
  .connector-item-id {
    color: var(--muted);
    font-size: 11px;
    font-family: 'Courier New', monospace;
  }
  .connector-detail-btn {
    background: transparent;
    border: 1px solid var(--border);
    padding: 4px 10px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 12px;
    color: var(--navy);
  }
  .connector-detail-btn:hover {
    background: #f0f1f5;
  }

  /* ---------- Authorization warning ---------- */
  .auth-warning {
    background: #fff3cd;
    border: 1px solid #ffc107;
    border-radius: 8px;
    padding: 12px 16px;
    margin: 12px 0;
    display: flex;
    align-items: flex-start;
    gap: 12px;
  }
  .auth-warning-icon {
    font-size: 20px;
    flex-shrink: 0;
  }
  .auth-warning-content {
    flex: 1;
  }
  .auth-warning-title {
    font-weight: 600;
    font-size: 14px;
    margin-bottom: 4px;
  }
  .auth-warning-text {
    font-size: 13px;
    color: #856404;
    margin-bottom: 8px;
  }
  .auth-warning-btn {
    background: #ffc107;
    color: #000;
    border: none;
    padding: 6px 14px;
    border-radius: 6px;
    cursor: pointer;
    font-size: 13px;
    font-weight: 600;
  }
  .auth-warning-btn:hover {
    background: #e0a800;
  }
</style>
</head>
<body>

<div id="app"></div>

<script>
const { createApp, ref, onMounted, nextTick } = Vue;

// ---------------------------------------------------------------
// Satu-satunya hal yang perlu diubah kalau backend jalan di alamat
// atau port lain.
// ---------------------------------------------------------------
const BACKEND_URL = "http://localhost:8080";

createApp({
  setup() {
    const checkingSession = ref(true);
    const user = ref(null);
    const loginError = ref("");

    const messages = ref([]);
    const chatInput = ref("");
    const sending = ref(false);
    const messagesEl = ref(null);

    // File attachment state
    const attachedFile = ref(null);
    const filePreviewUrl = ref(null);
    const uploadedGCSUri = ref(null); // Store GCS URI after upload
    const uploadingFile = ref(false); // Track upload progress

    // Connector management
    const connectors = ref(null);
    const connectorDetail = ref(null);
    const engineConfig = ref(null);
    const loadingConnectors = ref(false);
    const needsConnectorAuth = ref(false);
    const authKeywords = ref([]);

    // -------------------------------------------------------------
    // File attachment functions
    // -------------------------------------------------------------
    function triggerFileInput() {
      document.getElementById('file-input').click();
    }

    async function handleFileSelect(event) {
      const file = event.target.files[0];
      if (!file) return;

      // Check file size (max 10MB)
      const maxSize = 10 * 1024 * 1024; // 10MB
      if (file.size > maxSize) {
        alert('File terlalu besar! Maksimal 10MB.');
        event.target.value = '';
        return;
      }

      attachedFile.value = file;

      // Generate preview for images
      if (file.type.startsWith('image/')) {
        const reader = new FileReader();
        reader.onload = (e) => {
          filePreviewUrl.value = e.target.result;
        };
        reader.readAsDataURL(file);
      } else {
        filePreviewUrl.value = null;
      }

      console.log('[DEBUG] File selected:', file.name, formatFileSize(file.size));
      console.log('[DEBUG] Uploading file to server...');

      // Upload file immediately to get file ID
      uploadingFile.value = true;
      try {
        const formData = new FormData();
        formData.append('file', file);

        const res = await fetch(`${BACKEND_URL}/api/files/upload`, {
          method: 'POST',
          credentials: 'include',
          body: formData
        });

        if (!res.ok) {
          const error = await res.json();
          throw new Error(error.error || 'Failed to upload file');
        }

        const data = await res.json();
        uploadedGCSUri.value = data.gcsUri;

        console.log('[DEBUG] ✅ File uploaded successfully');
        console.log('[DEBUG] - GCS URI:', data.gcsUri);
      } catch (error) {
        console.error('[DEBUG] ❌ File upload failed:', error);
        alert('Gagal upload file: ' + error.message);
        removeAttachment();
      } finally {
        uploadingFile.value = false;
      }

      // Clear the input so same file can be selected again
      event.target.value = '';
    }

    function removeAttachment() {
      attachedFile.value = null;
      filePreviewUrl.value = null;
      uploadedGCSUri.value = null;
      console.log('[DEBUG] Attachment removed');
    }

    function formatFileSize(bytes) {
      if (bytes === 0) return '0 Bytes';
      const k = 1024;
      const sizes = ['Bytes', 'KB', 'MB', 'GB'];
      const i = Math.floor(Math.log(bytes) / Math.log(k));
      return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
    }

    function getFileIcon(file) {
      if (!file) return '📄';
      if (file.type.startsWith('image/')) return '🖼️';
      if (file.type.startsWith('video/')) return '🎥';
      if (file.type.startsWith('audio/')) return '🎵';
      if (file.type.includes('pdf')) return '📕';
      if (file.type.includes('word') || file.type.includes('document')) return '📘';
      if (file.type.includes('excel') || file.type.includes('spreadsheet')) return '📊';
      if (file.type.includes('powerpoint') || file.type.includes('presentation')) return '📙';
      if (file.type.includes('zip') || file.type.includes('rar') || file.type.includes('7z')) return '📦';
      return '📄';
    }

    // -------------------------------------------------------------
    // 1) Cek status login
    // -------------------------------------------------------------
    async function checkSession() {
      try {
        console.log("[DEBUG] Checking session...");
        const res = await fetch(`${BACKEND_URL}/api/me`, {
          credentials: "include",
        });

        if (res.ok) {
          const data = await res.json();
          user.value = data;
          console.log("[DEBUG] ✅ User logged in:", user.value);
        } else {
          user.value = null;
        }
      } catch (e) {
        console.error("[DEBUG] ⚠️ Error checking session:", e);
        user.value = null;
      } finally {
        checkingSession.value = false;
      }
    }

    // -------------------------------------------------------------
    // 2) Login
    // -------------------------------------------------------------
    function login() {
      console.log("[DEBUG] 🔐 Initiating login flow...");
      window.location.href = `${BACKEND_URL}/auth/login`;
    }

    // -------------------------------------------------------------
    // 3) Logout
    // -------------------------------------------------------------
    async function logout() {
      try {
        await fetch(`${BACKEND_URL}/auth/logout`, {
          method: "POST",
          credentials: "include",
        });
      } catch (e) {
        console.error("[DEBUG] Logout error:", e);
      } finally {
        user.value = null;
        messages.value = [];
        attachedFile.value = null;
        filePreviewUrl.value = null;
        window.location.reload();
      }
    }

    // -------------------------------------------------------------
    // 4) Send message (with optional file attachment)
    // -------------------------------------------------------------
    async function sendMessage() {
      const text = chatInput.value.trim();
      const file = attachedFile.value;
      const gcsUri = uploadedGCSUri.value;

      if (!text || sending.value) return;

      // Add user message to UI
      const userMessage = {
        role: "user",
        text: text,
        file: file ? {
          name: file.name,
          size: file.size,
          type: file.type,
          previewUrl: filePreviewUrl.value
        } : null
      };

      messages.value.push(userMessage);
      chatInput.value = "";
      removeAttachment(); // Clear attachment state

      sending.value = true;
      await scrollToBottom();

      try {
        // Build request body (always JSON now)
        const requestBody = {
          message: text
        };

        // Add GCS URIs if file was uploaded
        if (gcsUri) {
          requestBody.gcsUris = [gcsUri];
          console.log('[DEBUG] Sending message with GCS URI:', gcsUri);
        } else {
          console.log('[DEBUG] Sending text-only message');
        }

        const res = await fetch(`${BACKEND_URL}/api/chat`, {
          method: "POST",
          credentials: "include",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(requestBody),
        });

        if (res.status === 401) {
          messages.value.push({
            role: "error",
            text: "Sesi kamu sudah habis. Silakan login ulang.",
          });
          user.value = null;
          return;
        }

        const data = await res.json();

        if (!res.ok) {
          messages.value.push({
            role: "error",
            text: data.error || "Terjadi kesalahan saat menghubungi Gemini Enterprise.",
          });
          return;
        }

        // Check if response indicates connector needs authorization
        if (data.connectorAuthCheck && data.connectorAuthCheck.needsAuthorization) {
          needsConnectorAuth.value = true;
          authKeywords.value = data.connectorAuthCheck.detectedKeywords || [];
        }

        // Extract actual response data
        const responseData = data.raw || data;

        // Handle streaming response
        let answerText = "";
        if (Array.isArray(responseData)) {
          for (const chunk of responseData) {
            const chunkText = chunk?.answer?.replies?.[0]?.groundedContent?.content?.text;
            if (chunkText) {
              answerText += chunkText;
            }
          }
        }

        // Fallback to non-streaming response
        if (!answerText) {
          answerText =
            responseData?.answer?.replies?.[0]?.groundedContent?.content?.text ||
            responseData?.answer?.answerText ||
            JSON.stringify(responseData, null, 2);
        }

        messages.value.push({ role: "assistant", text: answerText });
      } catch (e) {
        messages.value.push({
          role: "error",
          text: "Gagal terhubung ke backend. Pastikan backend sedang berjalan. Error: " + e.message,
        });
      } finally {
        sending.value = false;
        await scrollToBottom();
      }
    }

    async function scrollToBottom() {
      await nextTick();
      if (messagesEl.value) {
        messagesEl.value.scrollTop = messagesEl.value.scrollHeight;
      }
    }

    // -------------------------------------------------------------
    // Connector management functions (unchanged)
    // -------------------------------------------------------------
    async function getConnectorList() {
      loadingConnectors.value = true;
      connectorDetail.value = null;
      try {
        const res = await fetch(`${BACKEND_URL}/api/datastores`, {
          credentials: "include",
        });
        if (res.ok) {
          connectors.value = await res.json();
        }
      } catch (e) {
        console.error("[DEBUG] Error fetching connector list:", e);
      } finally {
        loadingConnectors.value = false;
      }
    }

    async function getConnectorDetail(dataStoreId) {
      loadingConnectors.value = true;
      try {
        const res = await fetch(`${BACKEND_URL}/api/datastores/${dataStoreId}`, {
          credentials: "include",
        });
        if (res.ok) {
          connectorDetail.value = await res.json();
        }
      } catch (e) {
        console.error("[DEBUG] Error fetching connector detail:", e);
      } finally {
        loadingConnectors.value = false;
      }
    }

    async function getEngineConfig() {
      loadingConnectors.value = true;
      try {
        const res = await fetch(`${BACKEND_URL}/api/engine`, {
          credentials: "include",
        });
        if (res.ok) {
          engineConfig.value = await res.json();
        }
      } catch (e) {
        console.error("[DEBUG] Error fetching engine config:", e);
      } finally {
        loadingConnectors.value = false;
      }
    }

    async function checkConnectorStatus() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/connector/status`, {
          credentials: "include",
        });
        if (res.ok) {
          const data = await res.json();
          return data.authorized;
        }
        return false;
      } catch (e) {
        return false;
      }
    }

    function authorizeConnector() {
      const width = 500;
      const height = 600;
      const left = (screen.width - width) / 2;
      const top = (screen.height - height) / 2;

      const popup = window.open(
        `${BACKEND_URL}/auth/connector/authorize`,
        'ConnectorAuthorization',
        `width=${width},height=${height},left=${left},top=${top},toolbar=no,menubar=no,scrollbars=yes`
      );

      if (!popup) {
        alert('❌ Popup blocked! Please allow popups for this site and try again.');
        return;
      }

      const checkPopup = setInterval(async () => {
        if (popup.closed) {
          clearInterval(checkPopup);
          const authorized = await checkConnectorStatus();
          if (authorized) {
            alert('✅ Outlook connector authorized!');
            needsConnectorAuth.value = false;
          } else {
            alert('⚠️ Connector authorization may have failed.');
          }
        }
      }, 500);
    }

    async function clearAllSessions() {
      try {
        const res = await fetch(`${BACKEND_URL}/auth/debug/clear-all-sessions`, {
          credentials: "include",
        });
        const data = await res.json();
        alert("✅ All sessions cleared!\n\n" + data.message);
        window.location.reload();
      } catch (e) {
        alert("❌ Error clearing sessions: " + e.message);
      }
    }

    async function listSessions() {
      try {
        const res = await fetch(`${BACKEND_URL}/auth/debug/sessions`, {
          credentials: "include",
        });
        const data = await res.json();
        alert(`Active Sessions: ${data.count}\n\n${data.sessionIDs.join('\n')}`);
      } catch (e) {
        alert("❌ Error listing sessions: " + e.message);
      }
    }

    async function getTokenInfo() {
      try {
        const res = await fetch(`${BACKEND_URL}/api/debug/token-info`, {
          credentials: "include",
        });
        const data = await res.json();
        const info = [
          "📋 TOKEN INFORMATION",
          "",
          `Session: ${data.session.email}`,
          `Token: ${data.tokenPreview}`,
        ].join('\n');
        alert(info);
      } catch (e) {
        alert("❌ Error getting token info: " + e.message);
      }
    }

    function initials(name) {
      if (!name) return "?";
      return name
        .split(" ")
        .map((p) => p[0])
        .slice(0, 2)
        .join("")
        .toUpperCase();
    }

    onMounted(checkSession);

    return {
      checkingSession,
      user,
      loginError,
      messages,
      chatInput,
      sending,
      messagesEl,
      attachedFile,
      filePreviewUrl,
      connectors,
      connectorDetail,
      engineConfig,
      loadingConnectors,
      needsConnectorAuth,
      authKeywords,
      login,
      logout,
      sendMessage,
      triggerFileInput,
      handleFileSelect,
      removeAttachment,
      formatFileSize,
      getFileIcon,
      getConnectorList,
      getConnectorDetail,
      getEngineConfig,
      checkConnectorStatus,
      authorizeConnector,
      clearAllSessions,
      listSessions,
      getTokenInfo,
      initials,
    };
  },

  template: `
    <div v-if="checkingSession" class="checking">Memeriksa status login…</div>

    <div v-else class="page">
      <header>
        <div class="brand">CNGPT — Demo SSO</div>
        <div v-if="user" class="user-box">
          <div class="avatar">{{ initials(user.name) }}</div>
          <span>{{ user.name || user.email }}</span>
          <button @click="logout">Logout</button>
        </div>
      </header>

      <!-- ============ BELUM LOGIN ============ -->
      <div v-if="!user" class="center-screen">
        <div class="login-card">
          <h1>Masuk ke CNGPT</h1>
          <p>Gunakan akun Microsoft kantor kamu untuk melanjutkan (Single Sign-On).</p>

          <button class="ms-login-btn" @click="login">
            <span class="ms-icon"><span></span><span></span><span></span><span></span></span>
            Login dengan Microsoft
          </button>

          <div v-if="loginError" class="error-box">{{ loginError }}</div>
        </div>
      </div>

      <!-- ============ SUDAH LOGIN: CHAT ============ -->
      <div v-else class="chat-wrap">
        <!-- Authorization Warning Banner -->
        <div v-if="needsConnectorAuth" class="auth-warning">
          <div class="auth-warning-icon">⚠️</div>
          <div class="auth-warning-content">
            <div class="auth-warning-title">Connector Authorization Required</div>
            <div class="auth-warning-text">
              Outlook connector needs to be authorized before you can access your emails, calendar, and contacts.
            </div>
            <button class="auth-warning-btn" @click="authorizeConnector">
              🔐 Authorize Outlook Connector
            </button>
          </div>
        </div>

        <!-- Connector Management Panel -->
        <div class="connector-panel">
          <h3>🔌 Connector Management</h3>

          <div class="connector-actions">
            <button @click="getConnectorList" :disabled="loadingConnectors">
              {{ loadingConnectors ? 'Loading...' : 'Get Connector List' }}
            </button>
            <button @click="getEngineConfig" :disabled="loadingConnectors">
              {{ loadingConnectors ? 'Loading...' : 'Get Engine Config' }}
            </button>
            <button @click="authorizeConnector" style="background: #28a745;">
              🔐 Authorize Connector
            </button>
          </div>

          <div class="connector-actions" style="margin-top: 8px; border-top: 1px solid var(--border); padding-top: 12px;">
            <button @click="listSessions" style="background: #6c757d;">
              📋 List Sessions
            </button>
            <button @click="getTokenInfo" style="background: #17a2b8;">
              🔍 Token Info
            </button>
            <button @click="clearAllSessions" style="background: #dc3545;">
              🧹 Clear All Sessions
            </button>
          </div>

          <!-- Connector List Display -->
          <div v-if="connectors" class="connector-list">
            <div v-if="connectors.dataStores && connectors.dataStores.length > 0">
              <div v-for="(ds, idx) in connectors.dataStores" :key="idx" class="connector-item">
                <div class="connector-item-header">
                  <div>
                    <div class="connector-item-name">{{ ds.displayName || ds.name }}</div>
                    <div class="connector-item-id">{{ ds.name }}</div>
                  </div>
                  <button
                    class="connector-detail-btn"
                    @click="getConnectorDetail(ds.name.split('/').pop())"
                  >
                    Detail
                  </button>
                </div>
              </div>
            </div>
            <div v-else>
              {{ JSON.stringify(connectors, null, 2) }}
            </div>
          </div>

          <div v-if="connectorDetail" class="connector-list" style="margin-top: 12px;">
            <strong>📋 Connector Detail:</strong><br/><br/>
            {{ JSON.stringify(connectorDetail, null, 2) }}
          </div>

          <div v-if="engineConfig" class="connector-list" style="margin-top: 12px;">
            <strong>⚙️ Engine Configuration:</strong><br/><br/>
            {{ JSON.stringify(engineConfig, null, 2) }}
          </div>

          <div v-if="!connectors && !engineConfig && !loadingConnectors" class="connector-list empty">
            Click "Get Connector List" atau "Get Engine Config" untuk melihat informasi
          </div>
        </div>

        <div class="messages" ref="messagesEl">
          <div v-if="messages.length === 0" class="empty-state">
            Halo {{ user.name || user.email }} 👋<br />
            Coba tanya sesuatu, atau attach gambar untuk dianalisis.
          </div>

          <div
            v-for="(m, i) in messages"
            :key="i"
            class="bubble"
            :class="m.role"
          >
            {{ m.text }}

            <!-- Show attached file in user message -->
            <div v-if="m.file" class="bubble-attachment">
              <img v-if="m.file.previewUrl" :src="m.file.previewUrl" class="bubble-attachment-image" />
              <div v-else class="bubble-attachment-file">
                <span class="bubble-attachment-icon">{{ getFileIcon(m.file) }}</span>
                <span>{{ m.file.name }} ({{ formatFileSize(m.file.size) }})</span>
              </div>
            </div>
          </div>

          <div v-if="sending" class="bubble pending">Gemini sedang menjawab…</div>
        </div>

        <!-- Composer with file attachment -->
        <div class="composer">
          <!-- File preview (if attached) -->
          <div v-if="attachedFile" class="file-preview">
            <span class="file-preview-icon">{{ uploadingFile ? '⏳' : '✅' }}</span>
            <div class="file-preview-info">
              <div class="file-preview-name">{{ attachedFile.name }}</div>
              <div class="file-preview-size">
                {{ formatFileSize(attachedFile.size) }}
                <span v-if="uploadingFile" style="color: #888; margin-left: 8px;">Uploading...</span>
                <span v-else-if="uploadedGCSUri" style="color: #4caf50; margin-left: 8px;">Ready</span>
              </div>
            </div>
            <button class="file-preview-remove" @click="removeAttachment" :disabled="uploadingFile">✕</button>
          </div>

          <!-- Image preview (if image attached) -->
          <img v-if="filePreviewUrl" :src="filePreviewUrl" class="file-preview-image" />

          <!-- Input row -->
          <div class="composer-input-row">
            <input
              type="file"
              id="file-input"
              accept="image/*,.pdf,.doc,.docx,.txt"
              @change="handleFileSelect"
            />
            <button class="attach-btn" @click="triggerFileInput" :disabled="sending || uploadingFile" title="Attach file">
              📎
            </button>
            <input
              v-model="chatInput"
              type="text"
              placeholder="Tulis pesan atau attach file…"
              @keyup.enter="sendMessage"
              :disabled="sending || uploadingFile"
            />
            <button class="send-btn" @click="sendMessage" :disabled="sending || uploadingFile || !chatInput.trim()">
              Kirim
            </button>
          </div>
        </div>
      </div>
    </div>
  `,
}).mount("#app");
</script>
</body>
</html>
